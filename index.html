<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Meerdere iFrames met Buttons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        iframe {
            width: 45%;
            height: 200px;
            border: 2px solid #333;
            margin: 10px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
        }
        .buttons {
            margin-bottom: 20px;
        }
        button {
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>iFrames met knoppen</h2>

    <div class="buttons">
        <!-- Buttons voor iframe 1 -->
        <button onclick="loadContent('frame1', 'https://example.com')">
            Laad Example in Frame 1
        </button>

        <button onclick="loadContent('frame1', 'https://wikipedia.org')">
            Laad Wikipedia in Frame 1
        </button>

        <!-- Buttons voor iframe 2 -->
        <button onclick="loadContent('frame2', 'https://openai.com')">
            Laad OpenAI in Frame 2
        </button>

        <button onclick="loadContent('frame2', 'https://nos.nl')">
            Laad NOS in Frame 2
        </button>
    </div>

    <div class="container">
        <!-- iFrame 1 -->
        <iframe id="frame1" name="frame1"></iframe>

        <!-- iFrame 2 -->
        <iframe id="frame2" name="frame2"></iframe>
    </div>

    <script>
        function loadContent(frameName, url) {
            document.getElementsByName(frameName)[0].src = url;
        }
    </script>

</body>
</html>
